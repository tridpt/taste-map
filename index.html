<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quán quen</title>
  <meta name="theme-color" content="#f4f7f6" />
  <meta name="description" content="Bản đồ lưu quán ăn và cafe theo gu cá nhân." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Quán quen" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://unpkg.com" />
  <link rel="preconnect" href="https://tile.openstreetmap.org" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"><i data-lucide="map-pin"></i></span>
        <div>
          <h1>Quán quen</h1>
          <p id="placeCount">0 quán đã lưu</p>
        </div>
      </div>

      <div class="top-actions">
        <label class="search-box" for="globalSearch">
          <i data-lucide="search" aria-hidden="true"></i>
          <input id="globalSearch" type="search" autocomplete="off" placeholder="Tìm theo tên, khu vực, ghi chú" />
        </label>
        <button id="locateBtn" class="icon-button" type="button" title="Vị trí của tôi" aria-label="Vị trí của tôi">
          <i data-lucide="navigation"></i>
        </button>
        <button id="exportBtn" class="ghost-button" type="button">
          <i data-lucide="download"></i>
          <span>Xuất</span>
        </button>
        <button id="importTrigger" class="ghost-button" type="button">
          <i data-lucide="upload"></i>
          <span>Nhập</span>
        </button>
        <input id="importFile" type="file" accept="application/json,.json" hidden />
        <button id="installAppBtn" class="ghost-button hidden" type="button">
          <i data-lucide="download-cloud"></i>
          <span>Cài app</span>
        </button>
        <button id="updateAppBtn" class="ghost-button update-button hidden" type="button">
          <i data-lucide="refresh-cw"></i>
          <span>Cập nhật</span>
        </button>
        <button id="newPlaceBtn" class="primary-button" type="button">
          <i data-lucide="plus"></i>
          <span>Quán mới</span>
        </button>
      </div>
    </header>

    <main id="workspace" class="workspace">
      <aside class="sidebar" aria-label="Bộ lọc và danh sách quán">
        <section class="panel">
          <div class="panel-heading">
            <h2>Bộ lọc</h2>
            <button id="resetFiltersBtn" class="text-button" type="button">Đặt lại</button>
          </div>

          <div class="field">
            <label>Loại quán</label>
            <div id="typeFilters" class="segmented" role="group" aria-label="Loại quán"></div>
          </div>

          <div class="field">
            <label>Gu hôm nay</label>
            <div id="purposeFilters" class="chip-group" role="group" aria-label="Gu hôm nay"></div>
          </div>

          <div class="field">
            <label>Tag quen</label>
            <div id="tagFilters" class="chip-group tag-filter-list" role="group" aria-label="Tag quen"></div>
          </div>

          <div class="field compact">
            <label for="sortMode">Sắp xếp</label>
            <select id="sortMode">
              <option value="fit">Hợp gu nhất</option>
              <option value="distance">Gần tôi nhất</option>
              <option value="recent">Mới cập nhật</option>
              <option value="price">Giá thấp trước</option>
              <option value="name">Tên A-Z</option>
            </select>
          </div>
        </section>

        <section class="panel maps-import-panel">
          <div class="panel-heading">
            <h2>Nhập từ Maps</h2>
          </div>
          <label class="maps-import" for="mapsLinkInput">
            <i data-lucide="link" aria-hidden="true"></i>
            <textarea id="mapsLinkInput" rows="3" autocomplete="off" placeholder="Dán link Google Maps, mỗi dòng một link"></textarea>
            <button id="mapsClipboardBtn" class="icon-button dark" type="button" title="Dán từ clipboard" aria-label="Dán từ clipboard">
              <i data-lucide="clipboard"></i>
            </button>
            <button id="mapsImportBtn" class="icon-button dark" type="button" title="Nhập từ Google Maps" aria-label="Nhập từ Google Maps">
              <i data-lucide="wand-sparkles"></i>
            </button>
          </label>
          <div id="importQueuePanel" class="import-queue hidden">
            <div class="import-queue-head">
              <strong>Chờ xác nhận</strong>
              <div>
                <button id="saveImportQueueBtn" class="text-button" type="button">Lưu tất cả</button>
                <button id="clearImportQueueBtn" class="text-button" type="button">Xóa</button>
              </div>
            </div>
            <div id="importQueueList" class="import-queue-list"></div>
          </div>
        </section>

        <section class="panel list-panel">
          <div class="panel-heading">
            <h2>Quán đã lưu</h2>
            <span id="filteredCount" class="meta-count">0</span>
          </div>
          <div id="placeList" class="place-list"></div>
          <div id="emptyState" class="empty-state hidden">
            <i data-lucide="map"></i>
            <p>Chưa có quán phù hợp.</p>
          </div>
        </section>
      </aside>

      <div class="map-column">
        <section class="map-stage" aria-label="Bản đồ quán quen">
          <div class="map-toolbar">
            <div class="geo-search-wrap">
              <label class="geo-search" for="geoSearch">
                <i data-lucide="map-pinned" aria-hidden="true"></i>
                <input id="geoSearch" type="search" autocomplete="off" placeholder="Tìm địa điểm hoặc địa chỉ" />
                <button id="geoSearchBtn" class="icon-button dark" type="button" title="Tìm vị trí" aria-label="Tìm vị trí">
                  <i data-lucide="search"></i>
                </button>
              </label>
              <div id="geoResults" class="geo-results hidden"></div>
            </div>
            <button id="pinModeBtn" class="ghost-button dark" type="button" aria-pressed="false">
              <i data-lucide="crosshair"></i>
              <span>Ghim</span>
            </button>
          </div>
          <div id="map"></div>
          <div id="mapStatus" class="map-status hidden" role="status"></div>
        </section>

        <section class="below-map-panels" aria-label="Gợi ý và dữ liệu">
          <section class="panel recommendation-panel">
            <div class="panel-heading">
              <h2>Hôm nay đi đâu?</h2>
            </div>
            <div class="field compact">
              <label for="suggestMood">Mood</label>
              <select id="suggestMood">
                <option value="work">Làm việc</option>
                <option value="date">Đi date</option>
                <option value="quiet">Yên tĩnh</option>
                <option value="quick">Ăn nhanh</option>
                <option value="taste">Ăn ngon</option>
                <option value="nearby">Gần tôi</option>
              </select>
            </div>
            <div id="recommendationList" class="recommendation-list"></div>
          </section>

          <section class="panel data-panel">
            <div class="panel-heading">
              <h2>Dữ liệu</h2>
              <span id="backupStatus" class="meta-count">Chưa backup</span>
            </div>
            <div id="backupReminder" class="backup-reminder hidden">
              <i data-lucide="archive"></i>
              <span>Nên xuất backup định kỳ.</span>
              <button id="dismissBackupReminderBtn" class="text-button" type="button">Nhắc sau</button>
            </div>
            <div class="data-status-grid">
              <div class="data-status-item">
                <span>Số quán</span>
                <strong id="dataPlaceCount">0</strong>
              </div>
              <div class="data-status-item">
                <span>Backup gần nhất</span>
                <strong id="dataBackupAt">Chưa có</strong>
              </div>
              <div class="data-status-item">
                <span>Gist sync</span>
                <strong id="dataGistStatus">Chưa cấu hình</strong>
              </div>
              <div class="data-status-item">
                <span>LocalStorage</span>
                <strong id="dataStorageUsage">0 KB</strong>
              </div>
            </div>
            <div class="data-actions">
              <button id="encryptedExportBtn" class="ghost-button" type="button">
                <i data-lucide="lock-keyhole"></i>
                <span>Backup mã hóa</span>
              </button>
              <button id="plainExportBtn" class="ghost-button" type="button">
                <i data-lucide="file-json"></i>
                <span>JSON thường</span>
              </button>
            </div>
            <div class="gist-sync">
              <div class="field">
                <label for="gistToken">GitHub token</label>
                <input id="gistToken" type="password" autocomplete="off" placeholder="token có quyền gist" />
              </div>
              <div class="field">
                <label for="gistId">Gist ID</label>
                <input id="gistId" type="text" autocomplete="off" placeholder="để trống để tạo gist mới" />
              </div>
              <div class="data-actions">
                <button id="saveGistSettingsBtn" class="ghost-button" type="button">
                  <i data-lucide="save"></i>
                  <span>Lưu cấu hình</span>
                </button>
                <button id="pushGistBtn" class="ghost-button" type="button">
                  <i data-lucide="cloud-upload"></i>
                  <span>Đẩy lên</span>
                </button>
                <button id="pullGistBtn" class="ghost-button" type="button">
                  <i data-lucide="cloud-download"></i>
                  <span>Kéo về</span>
                </button>
              </div>
            </div>
          </section>
        </section>
      </div>

      <aside id="editorPanel" class="editor-panel" aria-label="Thông tin quán" aria-hidden="true">
        <form id="placeForm" autocomplete="off">
          <div class="editor-header">
            <div>
              <p id="editorMode" class="eyebrow">Quán mới</p>
              <h2 id="editorTitle">Lưu quán</h2>
            </div>
            <button id="closeEditorBtn" class="icon-button" type="button" title="Đóng" aria-label="Đóng">
              <i data-lucide="x">×</i>
            </button>
          </div>

          <input id="placeId" type="hidden" />

          <div class="field">
            <label for="placeName">Tên quán</label>
            <input id="placeName" type="text" required maxlength="80" />
          </div>

          <div class="two-col">
            <div class="field">
              <label for="placeType">Loại</label>
              <select id="placeType"></select>
            </div>
            <div class="field">
              <label for="priceLevel">Giá</label>
              <select id="priceLevel">
                <option value="1">₫</option>
                <option value="2">₫₫</option>
                <option value="3">₫₫₫</option>
                <option value="4">₫₫₫₫</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="placeAddress">Địa chỉ / khu vực</label>
            <input id="placeAddress" type="text" maxlength="160" />
          </div>

          <div class="two-col">
            <div class="field">
              <label for="placeLat">Vĩ độ</label>
              <input id="placeLat" type="number" step="0.000001" required />
            </div>
            <div class="field">
              <label for="placeLng">Kinh độ</label>
              <input id="placeLng" type="number" step="0.000001" required />
            </div>
          </div>

          <div class="field">
            <label for="lastVisit">Lần ghé gần nhất</label>
            <input id="lastVisit" type="date" />
          </div>

          <div id="ratingFields" class="rating-fields"></div>

          <div class="field">
            <label>Ảnh quán</label>
            <div class="photo-actions">
              <button id="addPhotoBtn" class="ghost-button" type="button">
                <i data-lucide="image-plus"></i>
                <span>Thêm ảnh</span>
              </button>
              <input id="placePhotosInput" type="file" accept="image/*" multiple hidden />
            </div>
            <div id="photoGallery" class="photo-gallery"></div>
          </div>

          <div class="field">
            <label>Giờ mở cửa</label>
            <div id="openingDays" class="day-toggle-group"></div>
            <div class="two-col">
              <div class="field inner-field">
                <label for="openingOpen">Mở</label>
                <input id="openingOpen" type="time" />
              </div>
              <div class="field inner-field">
                <label for="openingClose">Đóng</label>
                <input id="openingClose" type="time" />
              </div>
            </div>
          </div>

          <div class="field">
            <label>Lịch sử ghé</label>
            <div class="visit-entry">
              <input id="visitDate" type="date" />
              <select id="visitRating">
                <option value="5">5/5</option>
                <option value="4">4/5</option>
                <option value="3">3/5</option>
                <option value="2">2/5</option>
                <option value="1">1/5</option>
              </select>
              <button id="addVisitBtn" class="ghost-button" type="button">
                <i data-lucide="plus"></i>
              </button>
            </div>
            <input id="visitNote" type="text" maxlength="160" placeholder="Ghi chú lần ghé" />
            <div id="visitHistoryList" class="visit-history-list"></div>
          </div>

          <div class="field">
            <label for="placeTags">Tag riêng</label>
            <input id="placeTags" type="text" maxlength="120" placeholder="wifi mạnh, ngồi lâu, gửi xe dễ" />
          </div>

          <div class="field">
            <label for="placeNotes">Ghi chú</label>
            <textarea id="placeNotes" rows="4" maxlength="500"></textarea>
          </div>

          <div class="favorite-row">
            <label class="switch">
              <input id="favoritePlace" type="checkbox" />
              <span></span>
            </label>
            <span>Đánh dấu quán ruột</span>
          </div>

          <div class="form-actions">
            <button id="deletePlaceBtn" class="danger-button hidden" type="button">
              <i data-lucide="trash-2"></i>
              <span>Xóa</span>
            </button>
            <button class="primary-button" type="submit">
              <i data-lucide="save"></i>
              <span>Lưu quán</span>
            </button>
          </div>
        </form>
      </aside>
    </main>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
